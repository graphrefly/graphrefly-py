<meta charset="UTF-8">

<title>GraphReFly — 20 Theme Prototypes</title>

<!-- Fonts — a curated mix to showcase range -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Serif+Display&family=Instrument+Serif&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&family=Space+Grotesk:wght@400;500;700&family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;600;700&family=General+Sans:wght@400;500;600;700&family=Manrope:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,400&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Archivo:wght@300;400;600;700;900&family=Spectral:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  html{scroll-behavior:smooth;font-size:16px}
  body{background:#0a0a0f;color:#f5f0e8;font-family:'Source Sans 3',system-ui,sans-serif}

  /* ── NAV ── */
  .picker-nav{
    position:fixed;top:0;left:0;right:0;z-index:1000;
    background:rgba(10,10,15,.92);backdrop-filter:blur(16px);
    border-bottom:1px solid rgba(255,255,255,.06);
    padding:.75rem 1.5rem;
    display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
  }
  .picker-nav h1{font-size:.85rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#999;white-space:nowrap}
  .picker-pills{display:flex;gap:.4rem;flex-wrap:wrap}
  .picker-pill{
    padding:.35rem .7rem;border-radius:4px;font-size:.7rem;font-weight:600;
    letter-spacing:.04em;cursor:pointer;border:1px solid rgba(255,255,255,.1);
    background:transparent;color:#bbb;transition:all .2s;white-space:nowrap;
  }
  .picker-pill:hover{border-color:rgba(255,255,255,.3);color:#fff}
  .picker-pill.active{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.25)}

  /* ── THEME CARDS ── */
  .themes-grid{
    padding:5.5rem 1.5rem 3rem;
    display:flex;flex-direction:column;gap:4rem;
    max-width:1400px;margin:0 auto;
  }

  .theme-card{
    border-radius:16px;overflow:hidden;
    border:1px solid rgba(255,255,255,.06);
    box-shadow:0 8px 40px rgba(0,0,0,.4);
  }
  .theme-label{
    padding:.5rem 1rem;
    font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
    color:#999;background:rgba(0,0,0,.4);
    display:flex;justify-content:space-between;align-items:center;
  }
  .theme-label span.meta{font-weight:400;letter-spacing:.04em;color:#666;font-size:.6rem}

  .theme-preview{
    position:relative;overflow:hidden;
    min-height:100vh;
    display:flex;flex-direction:column;
  }

  /* ── Each theme's hero section ── */
  .tp-hero{
    position:relative;min-height:85vh;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;padding:4rem 2rem;
  }

  .tp-hero-bg{position:absolute;inset:0;z-index:0}

  .tp-orb{
    position:absolute;border-radius:50%;
    filter:blur(100px);will-change:transform;
  }

  .tp-content{position:relative;z-index:2;text-align:center;max-width:840px}
  .tp-kicker{font-size:.72rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;margin-bottom:1.25rem}
  .tp-title{line-height:1.05;margin:0 0 .4rem}
  .tp-title-re{-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .tp-subtitle{font-style:italic;letter-spacing:.1em;margin:0 0 1.75rem;opacity:.55}
  .tp-tagline{font-weight:300;line-height:1.6;margin:0 0 2.25rem}
  .tp-cta{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}

  .tp-btn{
    display:inline-flex;align-items:center;gap:.4rem;
    padding:.7rem 1.6rem;border-radius:6px;
    font-size:.85rem;font-weight:600;letter-spacing:.04em;
    text-decoration:none;border:none;cursor:pointer;transition:all .25s;
  }

  /* ── Philosophy strip ── */
  .tp-philosophy{padding:3rem 2rem;max-width:900px;margin:0 auto}
  .tp-phil-label{font-size:.68rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;margin-bottom:1rem}
  .tp-phil-quote{font-size:1.4rem;line-height:1.6;margin-bottom:.5rem}
  .tp-phil-trans{font-size:.9rem;font-style:italic;opacity:.5;margin-bottom:1.25rem}
  .tp-phil-body{font-size:.95rem;line-height:1.8;opacity:.75}

  /* ── Feature cards strip ── */
  .tp-features{padding:2rem 2rem 3rem;max-width:1100px;margin:0 auto}
  .tp-feat-label{font-size:.68rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;margin-bottom:.75rem}
  .tp-feat-heading{font-size:1.6rem;margin-bottom:1.75rem}
  .tp-feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1rem}
  .tp-feat-card{padding:1.5rem;border-radius:10px;border:1px solid rgba(255,255,255,.06)}
  .tp-feat-card h4{font-size:.95rem;margin-bottom:.5rem}
  .tp-feat-card p{font-size:.82rem;line-height:1.6;opacity:.65}
  .tp-feat-coord{font-size:.6rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.6rem;opacity:.5}

  /* ── Flow lines animation (shared SVG) ── */
  .tp-lines{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.45}
  .tp-lines svg{width:100%;height:100%}
  .tp-flow{fill:none;stroke-width:2;stroke-linecap:round;stroke-dasharray:1600;stroke-dashoffset:1600}
  .theme-card:hover .tp-flow{animation:tp-draw 3s ease forwards}
  @keyframes tp-draw{to{stroke-dashoffset:0}}

  /* ── Vertical text ── */
  .tp-vert{
    position:absolute;z-index:2;
    writing-mode:vertical-rl;
    font-size:.75rem;letter-spacing:.5em;opacity:.12;user-select:none;
  }
  .tp-vert-l{left:1.5rem;top:28%}
  .tp-vert-r{right:1.5rem;top:36%}

  /* ── Code block ── */
  .tp-code{padding:2rem;max-width:700px;margin:0 auto}
  .tp-code-block{border-radius:10px;overflow:hidden}
  .tp-code-header{padding:.5rem 1rem;display:flex;align-items:center;gap:.5rem;font-size:.72rem}
  .tp-code-dots{display:flex;gap:5px}
  .tp-code-dot{width:8px;height:8px;border-radius:50%}
  .tp-code-body{padding:1rem 1.25rem;font-size:.82rem;line-height:1.7;overflow-x:auto}
  .tp-code-body pre{margin:0;white-space:pre-wrap}

  /* ── Noise overlay per theme ── */
  .theme-preview::after{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:99;
    opacity:.025;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:128px 128px;
  }

  /* ── Responsive ── */
  @media(max-width:600px){
    .tp-title{font-size:2.5rem!important}
    .tp-tagline{font-size:1rem!important}
    .tp-vert{display:none}
    .tp-feat-grid{grid-template-columns:1fr}
  }

// Intersection observer for active pill highlighting
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.picker-pill').forEach(p => p.classList.remove('active'));
      const idx = themes.findIndex(t => t.id === e.target.id);
      if (idx >= 0) pillsEl.children[idx].classList.add('active');
    }
  });
}, { threshold: 0.3 });

themes.forEach(t => observer.observe(document.getElementById(t.id)));
